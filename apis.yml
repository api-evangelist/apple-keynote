- name: Keynote JavaScript for Automation API
  description: >-
    JavaScript-based automation interface for controlling Keynote on macOS.
    Provides the same automation capabilities as AppleScript using JavaScript
    syntax through the Open Scripting Architecture.
  image: https://www.apple.com/v/keynote/o/images/overview/keynote_icon__e6u8i7ju7e2e_large.jpg
  humanURL: https://developer.apple.com/library/archive/releasenotes/InterapplicationCommunication/RN-JavaScriptForAutomation/
  tags:
  - JavaScript
  - Automation
  - macOS
  - Scripting
  properties:
  - type: Documentation
    url: https://developer.apple.com/library/archive/releasenotes/InterapplicationCommunication/RN-JavaScriptForAutomation/
- name: Keynote Shortcuts Actions
  description: >-
    Shortcuts app actions for Keynote on iOS, iPadOS, and macOS, enabling
    users to open, create, and export presentations as part of automated
    workflows including format conversion and template generation.
  image: https://www.apple.com/v/keynote/o/images/overview/keynote_icon__e6u8i7ju7e2e_large.jpg
  humanURL: https://developer.apple.com/shortcuts/
  tags:
