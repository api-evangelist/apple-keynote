name: Apple Keynote
description: >-
  Apple Keynote is a presentation software application developed by Apple Inc. as part
  of the iWork productivity suite, available on macOS, iOS, iPadOS, and the web via
  iCloud. It enables creating visually rich presentations with animations, transitions,
  charts, and real-time collaboration. Keynote supports automation via AppleScript,
  JavaScript for Automation (JXA), and Apple Shortcuts, and provides iCloud-based
  access for cross-device sync and sharing.
image: https://www.apple.com/v/keynote/o/images/overview/keynote_icon__e6u8i7ju7e2e_large.jpg
url: https://www.apple.com/keynote/
