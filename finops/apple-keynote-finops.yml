alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Apple Keynote
providerId: apple-keynote
publisherName: Apple Inc.
serviceCategory: Productivity / Presentations
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Apple
  - iWork
  - iCloud
description: 'FOCUS-aligned FinOps view for Apple Keynote: the Keynote app itself is free; the only direct
  charge associated with Keynote workflows is the iCloud+ storage tier that holds the .key files. Allocation
  should track per-user iCloud+ tier cost and (where applicable) Apple Business Manager / Apple Education
  device-bundled licensing.'
sources:
  - https://www.apple.com/keynote/
  - https://www.apple.com/icloud/
billingModel:
  pricingCategory: Subscription (Storage Tier)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
focusColumns:
  ServiceName: Apple Keynote / iCloud+
  ServiceCategory: Productivity / Presentations
  ProviderName: Apple
  PublisherName: Apple Inc.
  InvoiceIssuerName: Apple Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
meters:
  - name: icloud_plus_subscription
    description: Per-user monthly iCloud+ storage tier covering Keynote document sync (50GB / 200GB /
      2TB / 6TB / 12TB)
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - apple_id
  - name: icloud_storage_used
    description: Actual iCloud storage consumed by Keynote documents (telemetry, not directly billed)
    unit: GB
    aggregation: max
    dimensions:
      - apple_id
      - app
  - name: keynote_documents
    description: Count of Keynote documents stored in iCloud Drive (for chargeback)
    unit: document
    aggregation: max
    dimensions:
      - apple_id
principles:
  - name: Visibility
    description: Use Apple Business Manager (where managed) or per-user Apple ID storage views to track
      iCloud+ tier and storage utilization.
  - name: Allocation
    description: Allocate iCloud+ subscription cost per managed Apple ID; tag by department or cost center
      via Apple Business Manager metadata.
  - name: Optimization
    description: Right-size iCloud+ tier per user; consolidate via Family Sharing where licensing permits;
      archive large legacy .key files locally.
  - name: Accountability
    description: IT / Workplace team owns the Apple Business Manager contract and per-seat iCloud+ assignment;
      individual users accountable for keeping storage within tier.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
